services:
  db:
    image: postgres:17
    restart: always
    shm_size: 128mb
    container_name: postgres
    env_file:
      - .env
    environment:
    ports:
      - "5432:5432"
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

